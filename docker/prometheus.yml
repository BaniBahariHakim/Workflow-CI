global:
  scrape_interval: 5s

scrape_configs:
  # Prometheus scrapes itself (useful for meta-monitoring)
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # "prometheus_exporter" is the Docker Compose service name
  - job_name: "ml_model_exporter"
    static_configs:
      - targets: ["prometheus_exporter:8000"]
    metrics_path: "/metrics"
